name: lerpz

services:
  postgres:
    image: postgres:17
    container_name: postgres
    restart: always
    hostname: postgres
    domainname: postgres.lerpz.local
    environment:
      - POSTGRES_USER=lerpz
      - POSTGRES_PASSWORD=Password123
      - POSTGRES_DB=primary
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      lerpz-network:
        aliases:
          - postgres.lerpz.local
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lerpz -d primary"]
      interval: 10s
      timeout: 5s
      retries: 5

  dragonfly:
    image: docker.dragonflydb.io/dragonflydb/dragonfly
    container_name: dragonfly
    restart: always
    hostname: dragonfly
    domainname: dragonfly.lerpz.local
    ulimits:
      memlock: -1
    ports:
      - "6379:6379"
    volumes:
      - dragonfly_data:/data
    networks:
      lerpz-network:
        aliases:
          - dragonfly.lerpz.local
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  traefik:
    image: traefik:v3.4
    container_name: traefik
    restart: always
    hostname: traefik
    domainname: lerpz.local
    command:
      - "--api.insecure=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--providers.docker.network=lerpz-network"
      - "--providers.file.filename=/etc/traefik/dynamic.yml"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
    ports:
      - "80:80"
      - "443:443"
      - "8080:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    configs:
      - source: traefik-dynamic
        target: /etc/traefik/dynamic.yml
    secrets:
      - cert.pem
      - key.pem
    networks:
      lerpz-network:
        aliases:
          - lerpz.local

  portal:
    container_name: portal
    restart: always
    init: true
    build:
      context: .
      dockerfile: svc/portal/Dockerfile
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.portal-http.rule=Host(`lerpz.local`)"
      - "traefik.http.routers.portal-http.entrypoints=web"
      - "traefik.http.routers.portal-http.priority=1"
      - "traefik.http.routers.portal-https.rule=Host(`lerpz.local`)"
      - "traefik.http.routers.portal-https.entrypoints=websecure"
      - "traefik.http.routers.portal-https.tls=true"
      - "traefik.http.routers.portal-https.priority=1"
      - "traefik.http.services.portal.loadbalancer.server.port=3000"
    expose:
      - "3000"
    hostname: lerpz-portal
    domainname: portal-lerpz.lerpz.local
    env_file: svc/portal/.env.docker
    depends_on:
      postgres:
        condition: service_healthy
      dragonfly:
        condition: service_healthy
    networks:
      lerpz-network:
        aliases:
          - portal.lerpz.local

  portal-api:
    container_name: portal-api
    restart: always
    init: true
    build:
      context: .
      dockerfile: svc/portal-api/Dockerfile
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.portal-api-http.rule=Host(`lerpz.local`) && PathPrefix(`/api`)"
      - "traefik.http.routers.portal-api-http.entrypoints=web"
      - "traefik.http.routers.portal-api-http.priority=2"
      - "traefik.http.routers.portal-api-https.rule=Host(`lerpz.local`) && PathPrefix(`/api`)"
      - "traefik.http.routers.portal-api-https.entrypoints=websecure"
      - "traefik.http.routers.portal-api-https.tls=true"
      - "traefik.http.routers.portal-api-https.priority=2"
      - "traefik.http.services.portal-api.loadbalancer.server.port=3001"
    expose:
      - "3001"
    hostname: lerpz-portal-api
    domainname: portal-api.lerpz.local
    env_file: svc/portal-api/.env.docker
    depends_on:
      postgres:
        condition: service_healthy
      dragonfly:
        condition: service_healthy
    networks:
      lerpz-network:
        aliases:
          - portal-api.lerpz.local

configs:
  traefik-dynamic:
    content: |
      tls:
        certificates:
          - certFile: /run/secrets/cert.pem
            keyFile: /run/secrets/key.pem
        stores:
          default:
            defaultCertificate:
              certFile: /run/secrets/cert.pem
              keyFile: /run/secrets/key.pem

secrets:
  cert.pem:
    file: ./certs/cert.pem
  key.pem:
    file: ./certs/key.pem

volumes:
  postgres_data:
  dragonfly_data:

networks:
  lerpz-network:
    name: lerpz-network
    driver: bridge

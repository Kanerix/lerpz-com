name: lerpz

services:
  postgres:
    image: postgres:latest
    container_name: postgres
    restart: on-failure
    hostname: postgres
    domainname: postgres.lerpz.local
    environment:
      - POSTGRES_USER=lerpz
      - POSTGRES_PASSWORD=Password123
      - POSTGRES_DB=primary
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
      - ./scripts/init-databases.sh:/docker-entrypoint-initdb.d/init-databases.sh:ro
    networks:
      lerpz-network:
        aliases:
          - postgres.lerpz.local
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lerpz -d primary"]
      interval: 10s
      timeout: 5s
      retries: 5

  dragonfly:
    image: docker.dragonflydb.io/dragonflydb/dragonfly:latest
    container_name: dragonfly
    restart: on-failure
    hostname: dragonfly
    domainname: dragonfly.lerpz.local
    ulimits:
      memlock: -1
    ports:
      - "6379:6379"
    volumes:
      - dragonfly_data:/data
    networks:
      lerpz-network:
        aliases:
          - dragonfly.lerpz.local
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant
    restart: on-failure
    hostname: qdrant
    domainname: qdrant.lerpz.local
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      lerpz-network:
        aliases:
          - qdrant.lerpz.local
    healthcheck:
      test:
        [
          "CMD",
          "bash",
          "-c",
          "exec 3<>/dev/tcp/localhost/6333 && echo -e 'GET /healthz HTTP/1.1\r\nHost: localhost\r\n\r\n' >&3 && cat <&3 | grep -q '200 OK'",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: minio
    restart: on-failure
    hostname: minio
    domainname: minio.lerpz.local
    command: server /data --console-address ":9001"
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=Password123
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    networks:
      lerpz-network:
        aliases:
          - minio.lerpz.local
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio-init:
    image: minio/mc:latest
    container_name: minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 minioadmin Password123 &&
        mc mb --ignore-existing local/lerpz
      "
    networks:
      - lerpz-network

  traefik:
    image: traefik:v3.4
    container_name: traefik
    restart: on-failure
    hostname: traefik
    domainname: lerpz.local
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command:
      - "--api.insecure=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--providers.docker.network=lerpz-network"
      - "--providers.file.filename=/etc/traefik/dynamic.yml"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
    ports:
      - "80:80"
      - "443:443"
      - "8080:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./certs:/etc/traefik/certs:ro
    configs:
      - source: traefik-dynamic
        target: /etc/traefik/dynamic.yml
    networks:
      - lerpz-network

  coruscant:
    container_name: coruscant
    restart: on-failure
    init: true
    profiles: ["full"]
    build:
      context: .
      dockerfile: svc/coruscant/Dockerfile
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.coruscant-http.rule=Host(`lerpz.local`)"
      - "traefik.http.routers.coruscant-http.entrypoints=web"
      - "traefik.http.routers.coruscant-http.priority=1"
      - "traefik.http.routers.coruscant-https.rule=Host(`lerpz.local`)"
      - "traefik.http.routers.coruscant-https.entrypoints=websecure"
      - "traefik.http.routers.coruscant-https.tls=true"
      - "traefik.http.routers.coruscant-https.priority=1"
      - "traefik.http.services.coruscant.loadbalancer.server.port=3000"
    expose:
      - "3000"
    hostname: lerpz-coruscant
    domainname: coruscant.lerpz.local
    env_file: svc/coruscant/.env.docker
    depends_on:
      postgres:
        condition: service_healthy
      dragonfly:
        condition: service_healthy
    networks:
      lerpz-network:
        aliases:
          - coruscant.lerpz.local

  kamino:
    container_name: kamino
    restart: on-failure
    init: true
    profiles: ["full"]
    build:
      context: .
      dockerfile: svc/kamino/Dockerfile
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.kamino-http.rule=Host(`api.lerpz.local`)"
      - "traefik.http.routers.kamino-http.entrypoints=web"
      - "traefik.http.routers.kamino-http.priority=2"
      - "traefik.http.routers.kamino-https.rule=Host(`api.lerpz.local`)"
      - "traefik.http.routers.kamino-https.entrypoints=websecure"
      - "traefik.http.routers.kamino-https.tls=true"
      - "traefik.http.routers.kamino-https.priority=2"
      - "traefik.http.services.kamino.loadbalancer.server.port=3001"
    expose:
      - "3001"
    hostname: lerpz-kamino
    domainname: kamino.lerpz.local
    env_file: svc/kamino/.env.docker
    depends_on:
      postgres:
        condition: service_healthy
      dragonfly:
        condition: service_healthy
    networks:
      lerpz-network:
        aliases:
          - kamino.lerpz.local

  artoo:
    container_name: artoo
    restart: on-failure
    init: true
    profiles: ["full"]
    build:
      context: .
      dockerfile: svc/artoo/Dockerfile
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.artoo-http.rule=Host(`agent.lerpz.local`)"
      - "traefik.http.routers.artoo-http.entrypoints=web"
      - "traefik.http.routers.artoo-http.priority=3"
      - "traefik.http.routers.artoo-https.rule=Host(`agent.lerpz.local`)"
      - "traefik.http.routers.artoo-https.entrypoints=websecure"
      - "traefik.http.routers.artoo-https.tls=true"
      - "traefik.http.routers.artoo-https.priority=3"
      - "traefik.http.services.artoo.loadbalancer.server.port=3002"
    expose:
      - "3002"
    hostname: lerpz-artoo
    domainname: artoo.lerpz.local
    env_file: svc/artoo/.env.docker
    depends_on:
      postgres:
        condition: service_healthy
      dragonfly:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    networks:
      lerpz-network:
        aliases:
          - artoo.lerpz.local

configs:
  traefik-dynamic:
    content: |
      tls:
        certificates:
          - certFile: /etc/traefik/certs/cert.pem
            keyFile: /etc/traefik/certs/key.pem
        stores:
          default:
            defaultCertificate:
              certFile: /etc/traefik/certs/cert.pem
              keyFile: /etc/traefik/certs/key.pem

      http:
        routers:
          coruscant-local-http:
            rule: "Host(`lerpz.local`)"
            entryPoints:
              - web
            service: coruscant-local
            priority: 1

          coruscant-local-https:
            rule: "Host(`lerpz.local`)"
            entryPoints:
              - websecure
            tls: {}
            service: coruscant-local
            priority: 1

          kamino-local-http:
            rule: "Host(`api.lerpz.local`)"
            entryPoints:
              - web
            service: kamino-local
            priority: 1

          kamino-local-https:
            rule: "Host(`api.lerpz.local`)"
            entryPoints:
              - websecure
            tls: {}
            service: kamino-local
            priority: 1

          artoo-local-http:
            rule: "Host(`agent.lerpz.local`)"
            entryPoints:
              - web
            service: artoo-local
            priority: 1

          artoo-local-https:
            rule: "Host(`agent.lerpz.local`)"
            entryPoints:
              - websecure
            tls: {}
            service: artoo-local
            priority: 1

        services:
          coruscant-local:
            loadBalancer:
              servers:
                - url: "http://host.docker.internal:3000"

          kamino-local:
            loadBalancer:
              servers:
                - url: "http://host.docker.internal:3001"

          artoo-local:
            loadBalancer:
              servers:
                - url: "http://host.docker.internal:3002"

volumes:
  postgres_data:
  dragonfly_data:
  qdrant_data:
  minio_data:

networks:
  lerpz-network:
    name: lerpz-network
    driver: bridge

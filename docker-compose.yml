name: lerpz

services:
  postgres:
    image: postgres:17
    container_name: postgres
    restart: on-failure
    hostname: postgres
    domainname: postgres.lerpz.local
    environment:
      - POSTGRES_USER=lerpz
      - POSTGRES_PASSWORD=Password123
      - POSTGRES_DB=primary
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      lerpz-network:
        aliases:
          - postgres.lerpz.local
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lerpz -d primary"]
      interval: 10s
      timeout: 5s
      retries: 5

  dragonfly:
    image: docker.dragonflydb.io/dragonflydb/dragonfly
    container_name: dragonfly
    restart: on-failure
    hostname: dragonfly
    domainname: dragonfly.lerpz.local
    ulimits:
      memlock: -1
    ports:
      - "6379:6379"
    volumes:
      - dragonfly_data:/data
    networks:
      lerpz-network:
        aliases:
          - dragonfly.lerpz.local
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant
    restart: on-failure
    hostname: qdrant
    domainname: qdrant.lerpz.local
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      lerpz-network:
        aliases:
          - qdrant.lerpz.local
    healthcheck:
      test: ["CMD", "bash", "-c", "exec 3<>/dev/tcp/localhost/6333 && echo -e 'GET /healthz HTTP/1.1\r\nHost: localhost\r\n\r\n' >&3 && cat <&3 | grep -q '200 OK'"]
      interval: 10s
      timeout: 5s
      retries: 5

  traefik:
    image: traefik:v3.4
    container_name: traefik
    restart: on-failure
    hostname: traefik
    domainname: lerpz.local
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command:
      - "--api.insecure=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--providers.docker.network=lerpz-network"
      - "--providers.file.filename=/etc/traefik/dynamic.yml"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
    ports:
      - "80:80"
      - "443:443"
      - "8080:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    configs:
      - source: traefik-dynamic
        target: /etc/traefik/dynamic.yml
    secrets:
      - cert.pem
      - key.pem
    networks:
      - lerpz-network

  # ---------------------------------------------------------------------------
  # Containerized services (only started with: docker compose --profile full up)
  # ---------------------------------------------------------------------------

  portal:
    container_name: portal
    restart: on-failure
    init: true
    profiles: ["full"]
    build:
      context: .
      dockerfile: svc/portal/Dockerfile
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.portal-http.rule=Host(`lerpz.local`)"
      - "traefik.http.routers.portal-http.entrypoints=web"
      - "traefik.http.routers.portal-http.priority=1"
      - "traefik.http.routers.portal-https.rule=Host(`lerpz.local`)"
      - "traefik.http.routers.portal-https.entrypoints=websecure"
      - "traefik.http.routers.portal-https.tls=true"
      - "traefik.http.routers.portal-https.priority=1"
      - "traefik.http.services.portal.loadbalancer.server.port=3000"
    expose:
      - "3000"
    hostname: lerpz-portal
    domainname: portal-lerpz.lerpz.local
    env_file: svc/portal/.env.docker
    depends_on:
      postgres:
        condition: service_healthy
      dragonfly:
        condition: service_healthy
    networks:
      lerpz-network:
        aliases:
          - portal.lerpz.local

  portal-api:
    container_name: portal-api
    restart: on-failure
    init: true
    profiles: ["full"]
    build:
      context: .
      dockerfile: svc/portal-api/Dockerfile
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.portal-api-http.rule=Host(`api.lerpz.local`)"
      - "traefik.http.routers.portal-api-http.entrypoints=web"
      - "traefik.http.routers.portal-api-http.priority=2"
      - "traefik.http.routers.portal-api-https.rule=Host(`api.lerpz.local`)"
      - "traefik.http.routers.portal-api-https.entrypoints=websecure"
      - "traefik.http.routers.portal-api-https.tls=true"
      - "traefik.http.routers.portal-api-https.priority=2"
      - "traefik.http.services.portal-api.loadbalancer.server.port=3001"
    expose:
      - "3001"
    hostname: lerpz-portal-api
    domainname: portal-api.lerpz.local
    env_file: svc/portal-api/.env.docker
    depends_on:
      postgres:
        condition: service_healthy
      dragonfly:
        condition: service_healthy
    networks:
      lerpz-network:
        aliases:
          - portal-api.lerpz.local

# -----------------------------------------------------------------------------
# Dynamic Traefik configuration
#
# Default mode (docker compose up):
#   Only infra services start (postgres, dragonfly, traefik).
#   Traefik routes to apps running on the host via host.docker.internal.
#   Start your apps locally:
#     - Portal:     pnpm dev:portal          (localhost:3000)
#     - Portal API: cargo run -p portal-api  (localhost:3001)
#
# Full mode (docker compose --profile full up --build):
#   All services run in containers. The container labels override the
#   file-based routes below (Docker provider takes priority by default).
# -----------------------------------------------------------------------------

configs:
  traefik-dynamic:
    content: |
      tls:
        certificates:
          - certFile: /run/secrets/cert.pem
            keyFile: /run/secrets/key.pem
        stores:
          default:
            defaultCertificate:
              certFile: /run/secrets/cert.pem
              keyFile: /run/secrets/key.pem

      http:
        routers:
          portal-local-http:
            rule: "Host(`lerpz.local`)"
            entryPoints:
              - web
            service: portal-local
            priority: 1

          portal-local-https:
            rule: "Host(`lerpz.local`)"
            entryPoints:
              - websecure
            tls: {}
            service: portal-local
            priority: 1

          portal-api-local-http:
            rule: "Host(`api.lerpz.local`)"
            entryPoints:
              - web
            service: portal-api-local
            priority: 1

          portal-api-local-https:
            rule: "Host(`api.lerpz.local`)"
            entryPoints:
              - websecure
            tls: {}
            service: portal-api-local
            priority: 1

        services:
          portal-local:
            loadBalancer:
              servers:
                - url: "http://host.docker.internal:3000"

          portal-api-local:
            loadBalancer:
              servers:
                - url: "http://host.docker.internal:3001"

secrets:
  cert.pem:
    file: ./certs/cert.pem
  key.pem:
    file: ./certs/key.pem

volumes:
  postgres_data:
  dragonfly_data:
  qdrant_data:

networks:
  lerpz-network:
    name: lerpz-network
    driver: bridge

name: lerpz

services:
  kamino:
    image: postgres:latest
    container_name: kamino
    restart: on-failure
    hostname: kamino
    domainname: kamino.lerpz.local
    environment:
      - POSTGRES_USER=lerpz
      - POSTGRES_PASSWORD=Password123
      - POSTGRES_DB=primary
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
      - ./scripts/init-databases.sh:/docker-entrypoint-initdb.d/init-databases.sh:ro
    networks:
      lerpz-network:
        aliases:
          - kamino.lerpz.local
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lerpz -d primary"]
      interval: 10s
      timeout: 5s
      retries: 5

  naboo:
    image: docker.dragonflydb.io/dragonflydb/dragonfly:latest
    container_name: naboo
    restart: on-failure
    hostname: naboo
    domainname: naboo.lerpz.local
    ulimits:
      memlock: -1
    ports:
      - "6379:6379"
    volumes:
      - dragonfly_data:/data
    networks:
      lerpz-network:
        aliases:
          - naboo.lerpz.local
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  ilum:
    image: qdrant/qdrant:latest
    container_name: ilum
    restart: on-failure
    hostname: ilum
    domainname: ilum.lerpz.local
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      lerpz-network:
        aliases:
          - ilum.lerpz.local
    healthcheck:
      test:
        [
          "CMD",
          "bash",
          "-c",
          "exec 3<>/dev/tcp/localhost/6333 && echo -e 'GET /healthz HTTP/1.1\r\nHost: localhost\r\n\r\n' >&3 && cat <&3 | grep -q '200 OK'",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  geonosis:
    image: minio/minio:latest
    container_name: geonosis
    restart: on-failure
    hostname: geonosis
    domainname: geonosis.lerpz.local
    command: server /data --console-address ":9001"
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=Password123
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    networks:
      lerpz-network:
        aliases:
          - geonosis.lerpz.local
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  geonosis-init:
    image: minio/mc:latest
    container_name: geonosis-init
    depends_on:
      geonosis:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://geonosis:9000 minioadmin Password123 &&
        mc mb --ignore-existing local/lerpz
      "
    networks:
      - lerpz-network

  traefik:
    image: traefik:v3.4
    container_name: traefik
    restart: on-failure
    hostname: traefik
    domainname: lerpz.local
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command:
      - "--api.insecure=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--providers.docker.network=lerpz-network"
      - "--providers.file.filename=/etc/traefik/dynamic.yml"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
    ports:
      - "80:80"
      - "443:443"
      - "8080:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./certs:/etc/traefik/certs:ro
    configs:
      - source: traefik-dynamic
        target: /etc/traefik/dynamic.yml
    networks:
      - lerpz-network

  holonet:
    container_name: holonet
    restart: on-failure
    init: true
    profiles: ["full"]
    build:
      context: .
      dockerfile: svc/holonet/Dockerfile
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.holonet-http.rule=Host(`lerpz.local`)"
      - "traefik.http.routers.holonet-http.entrypoints=web"
      - "traefik.http.routers.holonet-http.priority=1"
      - "traefik.http.routers.holonet-https.rule=Host(`lerpz.local`)"
      - "traefik.http.routers.holonet-https.entrypoints=websecure"
      - "traefik.http.routers.holonet-https.tls=true"
      - "traefik.http.routers.holonet-https.priority=1"
      - "traefik.http.services.holonet.loadbalancer.server.port=3000"
    expose:
      - "3000"
    hostname: lerpz-holonet
    domainname: holonet.lerpz.local
    env_file: svc/holonet/.env.docker
    depends_on:
      kamino:
        condition: service_healthy
      naboo:
        condition: service_healthy
    networks:
      lerpz-network:
        aliases:
          - holonet.lerpz.local

  venator:
    container_name: venator
    restart: on-failure
    init: true
    profiles: ["full"]
    build:
      context: .
      dockerfile: svc/venator/Dockerfile
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.venator-http.rule=Host(`api.lerpz.local`)"
      - "traefik.http.routers.venator-http.entrypoints=web"
      - "traefik.http.routers.venator-http.priority=2"
      - "traefik.http.routers.venator-https.rule=Host(`api.lerpz.local`)"
      - "traefik.http.routers.venator-https.entrypoints=websecure"
      - "traefik.http.routers.venator-https.tls=true"
      - "traefik.http.routers.venator-https.priority=2"
      - "traefik.http.services.venator.loadbalancer.server.port=3001"
    expose:
      - "3001"
    hostname: lerpz-venator
    domainname: venator.lerpz.local
    env_file: svc/venator/.env.docker
    depends_on:
      kamino:
        condition: service_healthy
      naboo:
        condition: service_healthy
    networks:
      lerpz-network:
        aliases:
          - venator.lerpz.local

  artoo:
    container_name: artoo
    restart: on-failure
    init: true
    profiles: ["full"]
    build:
      context: .
      dockerfile: svc/artoo/Dockerfile
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.artoo-http.rule=Host(`agent.lerpz.local`)"
      - "traefik.http.routers.artoo-http.entrypoints=web"
      - "traefik.http.routers.artoo-http.priority=3"
      - "traefik.http.routers.artoo-https.rule=Host(`agent.lerpz.local`)"
      - "traefik.http.routers.artoo-https.entrypoints=websecure"
      - "traefik.http.routers.artoo-https.tls=true"
      - "traefik.http.routers.artoo-https.priority=3"
      - "traefik.http.services.artoo.loadbalancer.server.port=3002"
    expose:
      - "3002"
    hostname: lerpz-artoo
    domainname: artoo.lerpz.local
    env_file: svc/artoo/.env.docker
    depends_on:
      kamino:
        condition: service_healthy
      naboo:
        condition: service_healthy
      ilum:
        condition: service_healthy
    networks:
      lerpz-network:
        aliases:
          - artoo.lerpz.local

configs:
  traefik-dynamic:
    content: |
      tls:
        certificates:
          - certFile: /etc/traefik/certs/cert.pem
            keyFile: /etc/traefik/certs/key.pem
        stores:
          default:
            defaultCertificate:
              certFile: /etc/traefik/certs/cert.pem
              keyFile: /etc/traefik/certs/key.pem

      http:
        routers:
          holonet-local-http:
            rule: "Host(`lerpz.local`)"
            entryPoints:
              - web
            service: holonet-local
            priority: 1

          holonet-local-https:
            rule: "Host(`lerpz.local`)"
            entryPoints:
              - websecure
            tls: {}
            service: holonet-local
            priority: 1

          artoo-local-http:
            rule: "Host(`agent.lerpz.local`)"
            entryPoints:
              - web
            service: artoo-local
            priority: 1

          artoo-local-https:
            rule: "Host(`agent.lerpz.local`)"
            entryPoints:
              - websecure
            tls: {}
            service: artoo-local
            priority: 1

          venator-local-http:
            rule: "Host(`api.lerpz.local`)"
            entryPoints:
              - web
            service: venator-local
            priority: 1

          venator-local-https:
            rule: "Host(`api.lerpz.local`)"
            entryPoints:
              - websecure
            tls: {}
            service: venator-local
            priority: 1

        services:
          holonet-local:
            loadBalancer:
              servers:
                - url: "http://host.docker.internal:3000"

          artoo-local:
            loadBalancer:
              servers:
                - url: "http://host.docker.internal:3002"

          venator-local:
            loadBalancer:
              servers:
                - url: "http://host.docker.internal:3001"

volumes:
  postgres_data:
  dragonfly_data:
  qdrant_data:
  minio_data:

networks:
  lerpz-network:
    name: lerpz-network
    driver: bridge

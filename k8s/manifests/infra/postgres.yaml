apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-init
  namespace: lerpz
data:
  # Mirrors scripts/init-databases.sh from the compose setup. Add extra database
  # names to EXTRA_DATABASES if kamino/artoo ever need separate databases.
  init-databases.sh: |
    #!/bin/bash
    set -euo pipefail

    EXTRA_DATABASES=()

    for db in "${EXTRA_DATABASES[@]}"; do
      echo "Creating database: $db"
      psql -v ON_ERROR_STOP=1 --username "$POSTGRES_USER" --dbname "$POSTGRES_DB" <<-SQL
        SELECT 'CREATE DATABASE "$db"'
        WHERE NOT EXISTS (SELECT FROM pg_database WHERE datname = '$db')\gexec
    SQL
      echo "Database '$db' created (or already exists)."
    done
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: lerpz
spec:
  selector:
    app: postgres
  ports:
    - name: postgres
      port: 5432
      targetPort: 5432
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: lerpz
spec:
  serviceName: postgres
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:17
          ports:
            - containerPort: 5432
          envFrom:
            - secretRef:
                name: infra-credentials
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql
            - name: init
              mountPath: /docker-entrypoint-initdb.d
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "lerpz", "-d", "primary"]
            initialDelaySeconds: 5
            periodSeconds: 10
      volumes:
        - name: init
          configMap:
            name: postgres-init
            defaultMode: 0755
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 1Gi

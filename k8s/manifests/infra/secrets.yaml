# Development-only credentials, matching docker-compose.yml.
# These are safe to commit ONLY because they are throwaway local values.
# Never reuse this pattern for anything deployed off your machine.
apiVersion: v1
kind: Secret
metadata:
  name: infra-credentials
  namespace: lerpz
type: Opaque
stringData:
  POSTGRES_USER: lerpz
  POSTGRES_PASSWORD: Password123
  POSTGRES_DB: primary
  MINIO_ROOT_USER: minioadmin
  MINIO_ROOT_PASSWORD: Password123

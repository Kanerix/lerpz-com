apiVersion: v1
kind: Service
metadata:
  name: coruscant
  namespace: lerpz
spec:
  selector:
    app: coruscant
  ports:
    - name: http
      port: 3000
      targetPort: 3000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: coruscant
  namespace: lerpz
spec:
  replicas: 1
  selector:
    matchLabels:
      app: coruscant
  template:
    metadata:
      labels:
        app: coruscant
    spec:
      containers:
        - name: coruscant
          image: lerpz/coruscant:dev
          # Use the image loaded via `kind load docker-image`, never pull.
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
          # Create with: kubectl -n lerpz create secret generic coruscant-env \
          #   --from-env-file=svc/coruscant/.env.docker
          envFrom:
            - secretRef:
                name: coruscant-env
          readinessProbe:
            tcpSocket:
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10

kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: lerpz
nodes:
  - role: control-plane
    kubeadmConfigPatches:
      # Label this node so Traefik (scheduled with an ingress-ready nodeSelector)
      # lands here and can bind hostPorts 80/443.
      - |
        kind: InitConfiguration
        nodeRegistration:
          kubeletExtraArgs:
            node-labels: "ingress-ready=true"
    extraPortMappings:
      # Forward the host's 80/443 into the node so Traefik's hostPort is
      # reachable at http(s)://lerpz.local on your machine.
      - containerPort: 80
        hostPort: 80
        protocol: TCP
      - containerPort: 443
        hostPort: 443
        protocol: TCP

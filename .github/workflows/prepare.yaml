name: "Detect changed services"

on:
  workflow_call:
    outputs:
      holonet:
        value: ${{ jobs.detect-changes.outputs.holonet }}
      coruscant:
        value: ${{ jobs.detect-changes.outputs.coruscant }}
      artoo:
        value: ${{ jobs.detect-changes.outputs.artoo }}

jobs:
  detect-changes:
    name: "Detect changed services"
    runs-on: ubuntu-latest

    outputs:
      holonet: ${{ steps.filter.outputs.holonet }}
      coruscant: ${{ steps.filter.outputs.coruscant }}
      artoo: ${{ steps.filter.outputs.artoo }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Detect changed paths per service
        id: filter
        uses: dorny/paths-filter@v4
        with:
          filters: |
            holonet:
              - 'svc/holonet/**'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'pnpm-workspace.yaml'
              - 'tsconfig.json'
            coruscant:
              - 'svc/coruscant/**'
              - 'crates/**'
              - 'Cargo.toml'
              - 'Cargo.lock'
            artoo:
              - 'svc/artoo/**'
              - 'crates/**'
              - 'Cargo.toml'
              - 'Cargo.lock'

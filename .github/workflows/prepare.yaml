name: "Detect changed services"

on:
  workflow_call:
    outputs:
      portal:
        value: ${{ jobs.detect-changes.outputs.portal }}
      portal-api:
        value: ${{ jobs.detect-changes.outputs.portal-api }}
      ai-agent:
        value: ${{ jobs.detect-changes.outputs.ai-agent }}

jobs:
  detect-changes:
    name: "Detect changed services"
    runs-on: ubuntu-latest

    outputs:
      portal: ${{ steps.filter.outputs.portal }}
      portal-api: ${{ steps.filter.outputs.portal-api }}
      ai-agent: ${{ steps.filter.outputs.ai-agent }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Detect changed paths per service
        id: filter
        uses: dorny/paths-filter@v4
        with:
          filters: |
            portal:
              - 'svc/portal/**'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'pnpm-workspace.yaml'
              - 'tsconfig.json'
            portal-api:
              - 'svc/portal-api/**'
              - 'crates/**'
              - 'Cargo.toml'
              - 'Cargo.lock'
            ai-agent:
              - 'svc/ai-agent/**'
              - 'crates/**'
              - 'Cargo.toml'
              - 'Cargo.lock'

name: "Pipeline"

on:
  workflow_dispatch:
    inputs:
      holonet:
        description: "Force deploy holonet"
        type: boolean
        default: false
      coruscant:
        description: "Force deploy coruscant"
        type: boolean
        default: false
      artoo:
        description: "Force deploy artoo"
        type: boolean
        default: false
  push:
    branches:
      - main
      - dev

jobs:
  prepare:
    name: "Detect changes"
    uses: ./.github/workflows/prepare.yaml

  env:
    name: "Resolve environment"
    runs-on: ubuntu-latest
    outputs:
      name: ${{ steps.resolve.outputs.name }}
    steps:
      - name: Resolve
        id: resolve
        run: echo "name=${{ github.ref_name == 'main' && 'prod' || 'stag' }}" >> $GITHUB_OUTPUT

  summary:
    name: "Changed services"
    runs-on: ubuntu-latest
    needs: [prepare, env]
    steps:
      - name: Print changed services
        run: |
          echo "## Changed Services" >> $GITHUB_STEP_SUMMARY
          echo "| Service | Changed |" >> $GITHUB_STEP_SUMMARY
          echo "| --- | --- |" >> $GITHUB_STEP_SUMMARY
          echo "| holonet | ${{ needs.prepare.outputs.holonet }} |" >> $GITHUB_STEP_SUMMARY
          echo "| coruscant | ${{ needs.prepare.outputs.coruscant }} |" >> $GITHUB_STEP_SUMMARY
          echo "| artoo | ${{ needs.prepare.outputs.artoo }} |" >> $GITHUB_STEP_SUMMARY

  deploy-holonet:
    name: "Deploy holonet"
    needs: [prepare, env]
    if: needs.prepare.outputs.holonet == 'true' || inputs.holonet == true
    uses: ./.github/workflows/deploy-container.yaml
    with:
      service: holonet
      container-app: lerpz-website-${{ needs.env.outputs.name }}
      environment: ${{ needs.env.outputs.name }}
    secrets: inherit

  deploy-coruscant:
    name: "Deploy coruscant"
    needs: [prepare, env]
    if: needs.prepare.outputs.coruscant == 'true' || inputs.coruscant == true
    uses: ./.github/workflows/deploy-container.yaml
    with:
      service: coruscant
      container-app: lerpz-api-${{ needs.env.outputs.name }}
      environment: ${{ needs.env.outputs.name }}
    secrets: inherit

  deploy-artoo:
    name: "Deploy artoo"
    needs: [prepare, env]
    if: needs.prepare.outputs.artoo == 'true' || inputs.artoo == true
    uses: ./.github/workflows/deploy-container.yaml
    with:
      service: artoo
      container-app: lerpz-agent-${{ needs.env.outputs.name }}
      environment: ${{ needs.env.outputs.name }}
    secrets: inherit

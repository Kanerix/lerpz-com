name: "Pipeline"

on:
  workflow_dispatch:
    inputs:
      portal:
        description: "Force deploy portal"
        type: boolean
        default: false
      portal-api:
        description: "Force deploy portal-api"
        type: boolean
        default: false
      ai-agent:
        description: "Force deploy ai-agent"
        type: boolean
        default: false
  push:
    branches:
      - main
      - dev

jobs:
  prepare:
    name: "Detect changes"
    uses: ./.github/workflows/prepare.yaml

  env:
    name: "Resolve environment"
    runs-on: ubuntu-latest
    outputs:
      name: ${{ steps.resolve.outputs.name }}
    steps:
      - name: Resolve
        id: resolve
        run: echo "name=${{ github.ref_name == 'main' && 'prod' || 'stag' }}" >> $GITHUB_OUTPUT

  summary:
    name: "Changed services"
    runs-on: ubuntu-latest
    needs: [prepare, env]
    steps:
      - name: Print changed services
        run: |
          echo "## Changed Services" >> $GITHUB_STEP_SUMMARY
          echo "| Service | Changed |" >> $GITHUB_STEP_SUMMARY
          echo "| --- | --- |" >> $GITHUB_STEP_SUMMARY
          echo "| portal | ${{ needs.prepare.outputs.portal }} |" >> $GITHUB_STEP_SUMMARY
          echo "| portal-api | ${{ needs.prepare.outputs.portal-api }} |" >> $GITHUB_STEP_SUMMARY
          echo "| ai-agent | ${{ needs.prepare.outputs.ai-agent }} |" >> $GITHUB_STEP_SUMMARY

  deploy-portal:
    name: "Deploy portal"
    needs: [prepare, env]
    if: needs.prepare.outputs.portal == 'true' || inputs.portal == true
    uses: ./.github/workflows/deploy-container.yaml
    with:
      service: portal
      container-app: lerpz-website-${{ needs.env.outputs.name }}
      environment: ${{ needs.env.outputs.name }}
    secrets: inherit
